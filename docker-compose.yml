version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quotations-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quotations
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/scripts/migrate.sql:/docker-entrypoint-initdb.d/migrate.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: quotations-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: quotations
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api/src:/app/src
      - ./api/dist:/app/dist
    command: npm run dev

  frontend:
    build:
      context: ./cotizador-app
      dockerfile: Dockerfile
    container_name: quotations-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://api:3000
    volumes:
      - ./cotizador-app/src:/app/src
      - ./cotizador-app/index.html:/app/index.html
    command: npm run dev -- --host

volumes:
  postgres_data:

networks:
  default:
    name: quotations-network
